name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Dead code (vulture)
        run: vulture .

      - name: Security scan (bandit)
        run: bandit -r . -ll -x ./venv,./tests -c pyproject.toml

      - name: Dependency audit (pip-audit)
        run: pip install pip-audit && pip-audit -r requirements.txt

      - name: Tests + coverage
        run: pytest --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (npm audit)
        run: npm audit --audit-level=moderate

      - name: Lint (eslint + knip)
        run: npm run validate

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

      - name: Build (vite)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─── E2E ──────────────────────────────────────────────────────────────────
  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.PI_PROJECT_PATH }}

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Rebuilding frontend"
            cd frontend
            npm ci --prefer-offline
            VITE_API_URL=${{ secrets.VITE_API_URL }} npm run build
            sudo cp -r dist/. /var/www/html/consensia/

            echo "==> Updating backend dependencies"
            cd ../backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "==> Restarting backend service"
            sudo systemctl restart consensia

            echo "==> Health check"
            sleep 5
            curl -f --retry 3 --retry-delay 5 http://localhost:8000/health || exit 1

            echo "==> Done"
