name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Dead code (vulture)
        run: vulture .

      - name: Tests + coverage
        run: pytest --cov=. --cov-fail-under=80

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint + knip)
        run: npm run validate

      - name: Unit tests + coverage
        run: npm run test:coverage

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.PI_PROJECT_PATH }}

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Rebuilding frontend"
            cd frontend
            npm ci --prefer-offline
            VITE_API_URL=${{ secrets.VITE_API_URL }} npm run build
            sudo cp -r dist/. /var/www/html/consensia/

            echo "==> Updating backend dependencies"
            cd ../backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "==> Restarting backend service"
            sudo systemctl restart consensia

            echo "==> Done"
